<!DOCTYPE html>
<html>
<head>
    <title>WebP Converter</title>
</head>
<body>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="output"></div>
    <script>
        async function convert() {
            const params = new URLSearchParams(window.location.search);
            const imgSrc = params.get('img');
            if (!imgSrc) {
                document.getElementById('output').innerText = 'No image provided';
                return;
            }

            try {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const webpData = canvas.toDataURL('image/webp', 0.85);
                    document.getElementById('output').innerText = webpData;
                    console.log('SUCCESS');
                };
                img.onerror = (e) => {
                    document.getElementById('output').innerText = 'Error loading image: ' + e;
                };
                img.src = imgSrc;
            } catch (e) {
                document.getElementById('output').innerText = 'Exception: ' + e;
            }
        }
        convert();
    </script>
</body>
</html>
